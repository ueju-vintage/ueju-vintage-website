<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UEJU Vintage</title>

<style>
body{
margin:0;
font-family:Arial;
background:#fff5f8;
color:#333;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 8%;
background:white;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.logo{
font-size:26px;
font-weight:bold;
color:#ff4f9a;
}

/* HERO */
.hero{
text-align:center;
padding:50px 20px;
}

.hero h1{
color:#ff4f9a;
font-size:40px;
}

.hero p{
color:#666;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px 8%;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:320px;
object-fit:cover;
}

.card-body{
padding:15px;
text-align:center;
}

.price{
color:#ff4f9a;
font-size:20px;
font-weight:bold;
}

.size{
font-size:14px;
color:#777;
margin:5px 0;
}

.btn{
background:#ff4f9a;
color:white;
padding:10px 15px;
border:none;
border-radius:25px;
cursor:pointer;
margin-top:10px;
}

.btn:hover{
transform:scale(1.05);
}

footer{
text-align:center;
padding:20px;
color:#777;
margin-top:30px;
}
</style>

</head>

<body>

<nav>
<div class="logo">UEJU Vintage 💖</div>
</nav>

<div class="hero">
<h1>L'élégance qui vous ressemble ✨</h1>
<p>Collection vintage exclusive au Maroc</p>
</div>

<!-- PRODUCTS -->
<div class="products">

<!-- ROBE BLEUE -->
<div class="card">
<img src="images/robe-bleue.jpg">
<div class="card-body">
<h3>Robe Bleue Vintage</h3>
<p class="price">299 DH</p>
<p class="size">S - M - L - XL</p>
<button class="btn">Ajouter au panier</button>
</div>
</div>

<!-- ROBE ROSE -->
<div class="card">
<img src="images/robe-rose.jpg">
<div class="card-body">
<h3>Robe Fleurie Rose</h3>
<p class="price">249 DH</p>
<p class="size">S - M - L - XL</p>
<button class="btn">Ajouter au panier</button>
</div>
</div>

</div>

<footer>
© 2026 UEJU Vintage - Tous droits réservés 💖
</footer>

</body>
</html>
